description: >-
  CloudRF is a radio frequency (RF) propagation, coverage modeling, and
  wireless network planning service. The HTTPS REST API at
  api.cloudrf.com offers point-to-multipoint coverage heatmaps,
  point-to-point path analysis, mesh networks, multisite, HF
  point-to-multipoint and point-to-point analysis, 3D coverage,
  satellite modeling, interference detection, geo-location of signals,
  archive and export of calculations, clutter and noise data
  management, account metrics, and reusable templates. Authentication is
  by API key passed as the `key` HTTP header.
