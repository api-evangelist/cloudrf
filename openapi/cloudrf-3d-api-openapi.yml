openapi: 3.1.0
info:
  title: CloudRF 3D API
  description: Public REST API for RF propagation modeling, coverage analysis, mesh and multisite planning, HF propagation, 3D coverage, satellite modeling, interference detection, signal geo-location, archive and export, clutter and noise data, and reusable templates. Operations, paths, and methods are documented in the CloudRF developer guide and Swagger UI.
  version: '1.0'
  contact:
    name: CloudRF
    url: https://cloudrf.com
  license:
    name: Proprietary
    url: https://cloudrf.com/terms
servers:
- url: https://api.cloudrf.com
  description: Production
- url: https://dev.cloudrf.com
  description: Development
security:
- ApiKeyAuth: []
tags:
- name: 3D
  description: 3D coverage and model upload operations.
paths:
  /3d:
    post:
      operationId: create3d
      summary: 3D coverage
      description: Calculate 3D coverage for a 3D model.
      tags:
      - 3D
      responses:
        '200':
          description: 3D coverage result.
  /3d-upload:
    post:
      operationId: upload3dModel
      summary: Upload GLB model
      description: Upload a GLB 3D model used for 3D coverage calculations.
      tags:
      - 3D
      responses:
        '200':
          description: Model uploaded.
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: key
externalDocs:
  description: CloudRF Developer Documentation
  url: https://cloudrf.com/documentation/developer/
